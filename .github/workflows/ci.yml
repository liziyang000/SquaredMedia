name: Theme and Addon CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.22.0
          cache: npm

      - name: Install frontend tooling
        run: npm ci

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: mbstring, mysqli, pdo_mysql, gd, zip, opcache

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run unit tests
        run: npm test

      - name: Lint frontend assets
        run: npm run lint

      - name: Type-check Next.js frontend
        run: npm run typecheck:web

      - name: Run Next.js browser acceptance
        run: npm run test:e2e

      - name: Build Next.js frontend
        env:
          NEXT_PUBLIC_API_BASE_URL: /index.php/pingfangapi/index
          NEXT_PUBLIC_HOME_API_URL: /index.php/pingfangapi/index
        run: npm run build:web

      - name: Lint MacCMS templates
        run: npm run lint:template

      - name: Verify MacCMS compatibility
        run: npm run verify:compat

      - name: Verify PHP preview
        run: npm run verify:preview

      - name: Build release package
        run: npm run package

      - name: Verify release package
        run: npm run verify:release

      - name: Upload theme package
        uses: actions/upload-artifact@v4
        with:
          name: pingfangvideo-theme
          path: dist/pingfangvideo.tar.gz

      - name: Upload addon package
        uses: actions/upload-artifact@v4
        with:
          name: pingfangdevice-addon
          path: dist/pingfangdevice.tar.gz

      - name: Upload production API addon package
        uses: actions/upload-artifact@v4
        with:
          name: pingfangapi-addon
          path: dist/pingfangapi.tar.gz
