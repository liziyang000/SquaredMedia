<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'none'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https: http:; media-src 'self' blob: data: https: http:; connect-src https: http:; worker-src blob:"
    />
    <title>视频播放</title>
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="./artplayer/pingfang-player-1.0.0.css" />
    <script defer src="./artplayer/artplayer-5.4.0.min.js"></script>
    <script defer src="./artplayer/hls-1.6.16.min.js"></script>
    <script defer src="./artplayer/pingfang-player-1.0.0.js"></script>
  </head>
  <body>
    <main class="player-shell">
      <div id="artplayer" aria-label="视频播放器"></div>
      <section id="playerStatus" class="player-status" role="status" aria-live="polite" hidden>
        <div class="player-status-card">
          <p id="playerStatusMessage">正在连接视频线路…</p>
          <div class="player-status-actions">
            <button type="button" data-player-action="retry">重新加载</button>
            <button type="button" data-player-action="lines">切换线路</button>
          </div>
        </div>
      </section>
      <noscript class="player-noscript">请启用 JavaScript 后播放视频。</noscript>
    </main>
  </body>
</html>
