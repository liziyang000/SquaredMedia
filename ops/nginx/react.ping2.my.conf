# Included by BaoTa from the react.ping2.my server block.
# MacCMS keeps ownership of PHP, player, uploads, and theme assets. Everything
# else is served by the loopback-only Next.js runtime.

location = /react-api.php {
    return 404;
}

location ^~ /preview/ {
    return 404;
}

location = /favicon.ico {
    alias /www/wwwroot/squaredMedia/template/pingfangvideo/images/brand/favicon.ico;
    expires 30d;
    access_log off;
}

location ~ ^/index\.php/user/(?:reg|findpass)(?:\.html)?(?:/.*)?$ {
    return 410;
}

location ~ ^/index\.php(?:/|$) {
    root /www/wwwroot/squaredMedia;
    try_files $uri =404;
    fastcgi_pass unix:/tmp/php-cgi-82.sock;
    fastcgi_intercept_errors off;
    fastcgi_index index.php;
    include fastcgi.conf;
    include pathinfo.conf;
}

location ~ ^/api\.php(?:/|$) {
    root /www/wwwroot/squaredMedia;
    try_files $uri =404;
    fastcgi_pass unix:/tmp/php-cgi-82.sock;
    fastcgi_index api.php;
    include fastcgi.conf;
    include pathinfo.conf;
}

location = /static/player/artplayer/api.php {
    root /www/wwwroot/squaredMedia;
    try_files /static/player/artplayer/api.php =404;
    fastcgi_pass unix:/tmp/php-cgi-82.sock;
    fastcgi_index api.php;
    include fastcgi.conf;
}

location ^~ /upload/ {
    root /www/wwwroot/squaredMedia;
    if ($uri ~* \.php(?:/|$)) { return 404; }
    try_files $uri =404;
    expires 30d;
}

location ^~ /static/ {
    root /www/wwwroot/squaredMedia;
    if ($uri ~* \.php(?:/|$)) { return 404; }
    try_files $uri =404;
    expires 30d;
}

location ^~ /template/ {
    root /www/wwwroot/squaredMedia;
    if ($uri ~* \.php(?:/|$)) { return 404; }
    try_files $uri =404;
    expires 30d;
}

location ^~ /_next/static/ {
    proxy_pass http://127.0.0.1:3100;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    expires 1y;
    add_header Cache-Control "public, max-age=31536000, immutable";
    access_log off;
}

location / {
    proxy_pass http://127.0.0.1:3100;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection "";
    proxy_buffering off;
    proxy_read_timeout 60s;
}
