<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PingFang Video Preview</title>
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="../template/pingfangvideo/css/style.css?v=20260615">
</head>
<body>
<header class="site-header">
  <div class="wrap header-inner">
    <a class="brand" href="?route=home" data-route="home" aria-label="平方影视">
      <img class="brand-logo" src="../template/pingfangvideo/images/site-logo.png" alt="平方影视 logo">
    </a>
    <button class="nav-toggle" type="button" aria-label="展开导航">
      <span></span><span></span><span></span>
    </button>
    <nav class="site-nav" id="siteNav"></nav>
    <form class="header-search" id="headerSearch">
      <input type="search" name="wd" placeholder="搜索影片、演员、导演">
      <button type="submit">搜索</button>
    </form>
    <a class="history-link" href="?route=history">观看记录</a>
  </div>
</header>
<main id="app">
  <section class="wrap system-page">
    <div class="system-box">
      <span class="eyebrow">加载中</span>
      <h1>正在连接本地数据</h1>
      <p>如果长时间没有响应，请检查本地服务是否运行。</p>
    </div>
  </section>
</main>
<template id="routeMarkers">
  <span data-route="detail"></span>
  <span data-route="play"></span>
</template>
<footer class="site-footer">
  <div class="wrap footer-grid">
    <div>
      <strong>平方影视</strong>
      <p>每日更新电影、剧集、综艺与动漫内容，支持多端自适应浏览。</p>
    </div>
    <div class="footer-links">
      <a href="?route=home">首页</a>
      <a href="?route=search">搜索</a>
      <a href="?route=rss">RSS</a>
    </div>
  </div>
</footer>
<script src="../template/pingfangvideo/js/app.js?v=20260615"></script>
<script type="module">
const response = await fetch("/preview/data.json");
const store = await response.json();
const app = document.querySelector("#app");
const nav = document.querySelector("#siteNav");
const searchForms = document.querySelectorAll("form");
const categoryPageSize = 12;

function url(route, params = {}) {
  const next = new URL(window.location.href);
  next.search = "";
  next.searchParams.set("route", route);
  Object.entries(params).forEach(([key, value]) => {
    if (value !== undefined && value !== null && value !== "") {
      next.searchParams.set(key, value);
    }
  });
  return `${next.pathname}${next.search}`;
}

function escapeHtml(value) {
  return String(value ?? "")
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;");
}

function videoById(id) {
  return store.videos.find((video) => String(video.id) === String(id)) || store.videos[0];
}

function videosByCategory(category) {
  if (!category) return store.videos;
  return store.videos.filter((video) => video.category === category);
}

function card(video) {
  return `
    <a class="vod-card" href="${url("detail", { id: video.id })}" data-route="detail">
      <span class="poster">
        <img src="${escapeHtml(video.poster)}" alt="${escapeHtml(video.title)}" loading="lazy">
        <em class="quality-badge">${escapeHtml(video.remark)}</em>
        <span class="score-badge">${escapeHtml(video.score)}</span>
      </span>
      <strong>${escapeHtml(video.title)}</strong>
      <small>${escapeHtml(video.actor)}</small>
      <span class="card-meta"><span>${escapeHtml(video.category)}</span><span>${escapeHtml(video.year)}</span></span>
    </a>`;
}

function rankItem(video, index) {
  return `
    <a class="rank-item" href="${url("detail", { id: video.id })}" data-route="detail">
      <span>${index + 1}</span>
      <strong>${escapeHtml(video.title)}</strong>
      <em>${escapeHtml(video.remark)}</em>
    </a>`;
}

function bannerSlide(video, index) {
  const active = index === 0 ? " is-active" : "";
  return `
    <a class="hero-slide${active}" href="${url("detail", { id: video.id })}" data-route="detail" data-carousel-slide style="--banner-bg: url('${escapeHtml(video.poster)}');">
      <span class="banner-bg"></span>
      <span class="banner-copy">
        <em class="eyebrow">今日更新 ${store.todayUpdated} 部</em>
        <strong>${escapeHtml(video.title)}</strong>
        <small>${escapeHtml(video.summary)}</small>
        <span class="banner-meta"><i>${escapeHtml(video.category)}</i><i>${escapeHtml(video.year)}</i><i>${escapeHtml(video.remark)}</i></span>
        <span class="banner-actions"><span class="primary-btn">查看详情</span><span class="ghost-btn">${escapeHtml(video.score)} 分</span></span>
      </span>
      <img class="banner-poster" src="${escapeHtml(video.poster)}" alt="${escapeHtml(video.title)}" loading="lazy">
    </a>`;
}

function renderNav() {
  nav.innerHTML = [
    `<a href="${url("home")}" data-route="home">首页</a>`,
    `<a href="${url("categories")}" data-route="categories">分类</a>`
  ].join("");
}

function categoryCount(category) {
  return store.videos.filter((video) => video.category === category).length;
}

function sortUrl(category, sort) {
  return url("category", { name: category, sort });
}

function renderPagination(route, params, currentPage, totalPages) {
  if (totalPages <= 1) return "";
  const page = Math.min(Math.max(Number(currentPage) || 1, 1), totalPages);
  const prev = Math.max(page - 1, 1);
  const next = Math.min(page + 1, totalPages);
  return `
    <nav class="paging" aria-label="分页">
      <a href="${url(route, { ...params, page: 1 })}" class="page-link">首页</a>
      <a href="${url(route, { ...params, page: prev })}" class="page-link">上一页</a>
      <span class="page-state">${page} / ${totalPages}</span>
      <a href="${url(route, { ...params, page: next })}" class="page-link">下一页</a>
      <a href="${url(route, { ...params, page: totalPages })}" class="page-link">尾页</a>
    </nav>`;
}

function sortVideos(videos, sort = "latest") {
  return [...videos].sort((a, b) => {
    if (sort === "hot") return b.hits - a.hits;
    if (sort === "score") return b.score - a.score;
    return b.updated.localeCompare(a.updated);
  });
}

function sortLabel(sort) {
  if (sort === "hot") return "最热";
  if (sort === "score") return "评分";
  return "最新";
}

function renderCategoriesPage(page = 1) {
  const totalPages = Math.ceil(store.categories.length / categoryPageSize);
  const currentPage = Math.min(Math.max(Number(page) || 1, 1), totalPages);
  const start = (currentPage - 1) * categoryPageSize;
  const pagedCategories = store.categories.slice(start, start + categoryPageSize);
  app.innerHTML = `
    <section class="wrap page-title">
      <span class="eyebrow">分类</span>
      <h1>全部分类</h1>
      <p>从这里进入电影、剧集、综艺、动漫和更多频道。</p>
    </section>
    <section class="wrap category-index">
      ${pagedCategories.map((category) => `
        <article class="category-tile">
          <a class="category-hit" href="${url("category", { name: category })}" data-route="category" aria-label="进入${escapeHtml(category)}"></a>
          <div class="category-main">
            <span>${escapeHtml(category)}</span>
            <em>${categoryCount(category)} 部</em>
          </div>
          <div class="category-children">
            <a class="category-sort sort-latest" href="${sortUrl(category, "latest")}">最新</a>
            <a class="category-sort sort-hot" href="${sortUrl(category, "hot")}">最热</a>
            <a class="category-sort sort-score" href="${sortUrl(category, "score")}">评分</a>
          </div>
        </article>`).join("")}
    </section>
    ${renderPagination("categories", {}, currentPage, totalPages)}`;
}

function historyItems() {
  return store.history.map((entry) => {
    const video = videoById(entry.videoId);
    const episode = video.episodes.find((item) => String(item.no) === String(entry.episode)) || video.episodes[0];
    return { ...entry, video, episode, date: entry.watchedAt.slice(0, 10), time: entry.watchedAt.slice(11) };
  });
}

function renderHistoryPage() {
  const groups = historyItems().reduce((result, item) => {
    if (!result[item.date]) result[item.date] = [];
    result[item.date].push(item);
    return result;
  }, {});

  app.innerHTML = `
    <section class="wrap page-title">
      <span class="eyebrow">观看记录</span>
      <h1>时间轴</h1>
      <p>按最近观看时间倒序整理，方便继续播放上次内容。</p>
    </section>
    <section class="wrap history-timeline">
      ${Object.entries(groups).map(([date, items]) => `
        <div class="timeline-date">${escapeHtml(date)}</div>
        ${items.map((item) => `
          <article class="timeline-item">
            <span class="timeline-dot"></span>
            <div class="timeline-time">${escapeHtml(item.time)}</div>
            <a class="timeline-card" href="${url("play", { id: item.video.id, episode: item.episode.no })}" data-route="play">
              <img src="${escapeHtml(item.video.poster)}" alt="${escapeHtml(item.video.title)}" loading="lazy">
              <span>
                <strong>${escapeHtml(item.video.title)} - ${escapeHtml(item.episode.name)}</strong>
                <small>${escapeHtml(item.video.category)} / ${escapeHtml(item.video.year)}</small>
                <em>${escapeHtml(item.progress)}</em>
              </span>
            </a>
          </article>`).join("")}
      `).join("")}
    </section>`;
}

function renderHome() {
  const latest = [...store.videos].sort((a, b) => b.updated.localeCompare(a.updated));
  const hot = [...store.videos].sort((a, b) => b.hits - a.hits).slice(0, 6);
  const banners = hot.slice(0, 5);
  app.innerHTML = `
    <section class="hero">
      <div class="wrap hero-grid">
        <section class="hero-carousel" data-carousel aria-label="首页热播轮播">
          <div class="banner-track">
            ${banners.map(bannerSlide).join("")}
          </div>
          <div class="hero-stats">
            <div class="stat-card"><strong>${store.todayUpdated}</strong><span>今日更新</span></div>
            <div class="stat-card"><strong>${store.videos.length}</strong><span>片库内容</span></div>
            <div class="stat-card"><strong>24h</strong><span>持续维护</span></div>
          </div>
          <div class="banner-controls">
            <button class="banner-arrow" type="button" data-carousel-prev aria-label="上一张">‹</button>
            <div class="banner-dots" role="tablist" aria-label="轮播分页">
              ${banners.map((video, index) => `<button class="banner-dot${index === 0 ? " is-active" : ""}" type="button" data-carousel-dot aria-label="第${index + 1}张"></button>`).join("")}
            </div>
            <button class="banner-arrow" type="button" data-carousel-next aria-label="下一张">›</button>
          </div>
        </section>
        <div class="hero-rank">
          <div class="section-head compact">
            <h2>热播榜</h2>
            <a href="${url("category")}">更多</a>
          </div>
          ${hot.map(rankItem).join("")}
        </div>
      </div>
    </section>
    <section class="wrap quick-types">
      ${store.categories.slice(0, 10).map((category) => `<a href="${url("category", { name: category })}" data-route="category">${escapeHtml(category)}</a>`).join("")}
    </section>
    <section class="wrap content-section">
      <div class="section-head">
        <h2>最新上线</h2>
        <a href="${url("category")}">全部影片</a>
      </div>
      <div class="vod-grid">${latest.map(card).join("")}</div>
    </section>`;
}

function renderCategory(name, sort = "latest") {
  const currentSort = ["latest", "hot", "score"].includes(sort) ? sort : "latest";
  const list = sortVideos(videosByCategory(name), currentSort);
  const areas = ["全部", "大陆", "香港", "台湾", "美国", "韩国", "日本", "泰国", "英国", "法国"];
  const years = ["全部", "2026", "2025", "2024", "2023", "2022", "2021", "2020"];
  const sorts = [
    ["latest", "最新"],
    ["hot", "最热"],
    ["score", "评分"]
  ];
  app.innerHTML = `
    <section class="wrap page-title">
      <span class="eyebrow">筛选</span>
      <h1>${escapeHtml(name || "影片库")}</h1>
      <p>按分类、地区、年份和排序方式查找内容。</p>
    </section>
    <section class="wrap filter-panel">
      <div>
        <strong>分类</strong>
        <a href="${url("category")}">全部</a>
        ${store.categories.map((category) => `<a href="${url("category", { name: category })}">${escapeHtml(category)}</a>`).join("")}
      </div>
      <div>
        <strong>地区</strong>
        ${areas.map((area) => `<a href="${url("category", { name })}">${escapeHtml(area)}</a>`).join("")}
      </div>
      <div>
        <strong>年份</strong>
        ${years.map((year) => `<a href="${url("category", { name })}">${escapeHtml(year)}</a>`).join("")}
      </div>
      <div>
        <strong>排序</strong>
        ${sorts.map(([value, label]) => `<a class="${value === currentSort ? "is-active" : ""}" href="${url("category", { name, sort: value })}">${escapeHtml(label)}</a>`).join("")}
      </div>
    </section>
    <section class="wrap content-section">
      <div class="section-head">
        <h2>${escapeHtml(sortLabel(currentSort))}影片</h2>
        <span>共 ${list.length} 部</span>
      </div>
      <div class="vod-grid">${list.map(card).join("")}</div>
    </section>`;
}

function renderSearch(keyword) {
  const wd = String(keyword || "").trim();
  const list = wd
    ? store.videos.filter((video) => `${video.title} ${video.actor} ${video.category}`.includes(wd))
    : store.videos;
  app.innerHTML = `
    <section class="wrap page-title">
      <span class="eyebrow">搜索结果</span>
      <h1>${escapeHtml(wd || "全部内容")}</h1>
      <p>找到 ${list.length} 条相关内容。</p>
    </section>
    <section class="wrap content-section">
      <div class="vod-list">
        ${list.map((video) => `
          <a class="list-item" href="${url("detail", { id: video.id })}" data-route="detail">
            <img src="${escapeHtml(video.poster)}" alt="${escapeHtml(video.title)}" loading="lazy">
            <span>
              <strong>${escapeHtml(video.title)}</strong>
              <small>${escapeHtml(video.actor)}</small>
              <span class="card-meta"><span>${escapeHtml(video.category)}</span><span>${escapeHtml(video.year)}</span><span>${escapeHtml(video.score)} 分</span></span>
              <em>${escapeHtml(video.summary)}</em>
            </span>
          </a>`).join("")}
      </div>
    </section>`;
}

function renderDetail(id) {
  const video = videoById(id);
  app.innerHTML = `
    <section class="detail-hero">
      <div class="wrap detail-grid">
        <div class="detail-poster">
          <img src="${escapeHtml(video.poster)}" alt="${escapeHtml(video.title)}">
          <span>${escapeHtml(video.remark)}</span>
        </div>
        <div class="detail-main detail-panel">
          <span class="eyebrow">${escapeHtml(video.category)}</span>
          <div class="detail-title-row">
            <h1>${escapeHtml(video.title)}</h1>
            <span class="score-badge">${escapeHtml(video.score)}</span>
          </div>
          <p class="meta">${escapeHtml(video.year)} / ${escapeHtml(video.area)} / ${escapeHtml(video.category)}</p>
          <p class="summary">${escapeHtml(video.summary)}</p>
          <div class="detail-actions">
            <a class="primary-btn" href="${url("play", { id: video.id, episode: 1 })}" data-route="play">立即播放</a>
            <a class="ghost-btn" href="${url("category", { name: video.category })}">同类影片</a>
          </div>
          <dl class="detail-data">
            <div><dt>导演</dt><dd>${escapeHtml(video.director)}</dd></div>
            <div><dt>主演</dt><dd>${escapeHtml(video.actor)}</dd></div>
            <div><dt>热度</dt><dd>${video.hits}</dd></div>
          </dl>
        </div>
      </div>
    </section>
    <section class="wrap content-section">
      <div class="episode-box">
        <div class="section-head compact">
          <h2>在线播放</h2>
          <span>${video.episodes.length} 集</span>
        </div>
        <div class="episode-grid">
          ${video.episodes.map((episode) => `<a href="${url("play", { id: video.id, episode: episode.no })}" data-route="play">${escapeHtml(episode.name)}</a>`).join("")}
        </div>
      </div>
    </section>`;
}

function renderPlay(id, episodeNo) {
  const video = videoById(id);
  const episode = video.episodes.find((item) => String(item.no) === String(episodeNo)) || video.episodes[0];
  app.innerHTML = `
    <section class="player-page">
      <div class="wrap">
        <div class="player-head">
          <div>
            <span class="eyebrow">正在播放</span>
            <h1>${escapeHtml(video.title)} - ${escapeHtml(episode.name)}</h1>
          </div>
          <a class="ghost-btn" href="${url("detail", { id: video.id })}">返回详情</a>
        </div>
        <div class="player-toolbar">
          <span>${escapeHtml(video.title)} / ${escapeHtml(episode.name)}</span>
          <a class="ghost-btn" href="${url("detail", { id: video.id })}">选集</a>
        </div>
        <div class="player-shell">
          <video controls poster="${escapeHtml(video.poster)}">
            <source src="${escapeHtml(episode.src)}" type="video/mp4">
          </video>
        </div>
      </div>
    </section>`;
}

function render() {
  const params = new URLSearchParams(window.location.search);
  const route = params.get("route") || "home";
  if (route === "categories") renderCategoriesPage(params.get("page"));
  else if (route === "history") renderHistoryPage();
  else
  if (route === "category") renderCategory(params.get("name"), params.get("sort"));
  else if (route === "search") renderSearch(params.get("wd"));
  else if (route === "detail") renderDetail(params.get("id"));
  else if (route === "play") renderPlay(params.get("id"), params.get("episode"));
  else renderHome();
  bindSearchForms();
  window.PingFangVideo?.initHeroCarousel?.(app);
}

function bindSearchForms() {
  document.querySelectorAll("form").forEach((form) => {
    form.addEventListener("submit", (event) => {
      event.preventDefault();
      const input = form.querySelector('input[name="wd"]');
      window.history.pushState({}, "", url("search", { wd: input?.value.trim() }));
      render();
    });
  });
}

document.body.addEventListener("click", (event) => {
  const link = event.target.closest("a[href]");
  if (!link) return;
  const next = new URL(link.href, window.location.href);
  if (next.origin !== window.location.origin || next.pathname !== window.location.pathname) return;
  event.preventDefault();
  window.history.pushState({}, "", `${next.pathname}${next.search}`);
  render();
});

window.addEventListener("popstate", render);
renderNav();
render();
</script>
</body>
</html>
