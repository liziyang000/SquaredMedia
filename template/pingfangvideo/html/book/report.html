{include file="public/head" seo_title="报错反馈" seo_keywords="$maccms.site_keywords" seo_description="$maccms.site_description" /}
<section class="wrap system-page">
  <form class="system-box verify-form" method="post" action="{:mac_url('gbook/save')}">
    <span class="eyebrow">报错反馈</span>
    <h1>片源报错</h1>
    <p>请填写无法播放、集数错误、画质异常或字幕问题，我们会尽快处理。</p>
    <label>
      <span>联系方式</span>
      <input type="text" name="gbook_name" autocomplete="name" placeholder="可填写称呼或联系方式">
    </label>
    <label>
      <span>问题描述</span>
      <textarea name="gbook_content" rows="5" required placeholder="请说明片名、集数和具体问题"></textarea>
    </label>
    <label>
      <span>验证码</span>
      <input type="text" name="verify" autocomplete="off" placeholder="输入验证码">
    </label>
    <div class="verify-code">{$verify}</div>
    <button class="primary-btn" type="submit">提交报错</button>
  </form>
</section>
{include file="public/foot" /}
