<!doctype html>
<html lang="zh-CN">
<head>
  <title>[seo_title] - {$maccms.site_name}</title>
  {include file="public/include" /}
  <meta name="keywords" content="[seo_keywords]">
  <meta name="description" content="[seo_description]">
</head>
<body>
<header class="site-header">
  <div class="wrap header-inner">
    <a class="brand" href="{$maccms.path}" aria-label="{$maccms.site_name}">
      <img class="brand-logo" src="{$maccms.path_tpl}images/site-logo.png" alt="{$maccms.site_name} logo">
    </a>
    <button class="nav-toggle" type="button" aria-label="展开导航">
      <span></span><span></span><span></span>
    </button>
    <nav class="site-nav">
      <a href="{$maccms.path}">首页</a>
      <a href="{:mac_url('label/categories')}">分类</a>
      <a href="{:mac_url('user/favs')}">收藏</a>
    </nav>
    <a class="mobile-category-entry" href="{:mac_url('label/categories')}">分类</a>
    <form class="header-search" method="get" action="{:mac_url('vod/search')}">
      <input type="search" name="wd" value="{$param.wd}" placeholder="搜索影片、演员、导演">
      <button type="submit">搜索</button>
    </form>
    <div class="user-menu">
      {if condition="$user.user_id gt 0"}
      <a class="user-avatar" href="{:mac_url('user/index')}" aria-label="用户中心" data-avatar-random data-avatar-name="{$user.user_name|mac_default='用户'}">
        <span class="user-avatar-letter">{if condition="$user.user_name neq ''"}{$user.user_name|mac_substring=1}{else/}用{/if}</span>
      </a>
      <div class="user-dropdown">
        <a href="{:mac_url('user/favs')}">收藏</a>
        <a href="{:mac_url('user/plays')}">播放记录</a>
        <a href="{:mac_url('user/logout')}">退出登录</a>
      </div>
      {else/}
      <a class="user-avatar user-avatar-guest" href="{:mac_url('user/login')}" aria-label="登录" data-avatar-random>
        <span>登录</span>
      </a>
      {/if}
    </div>
  </div>
</header>
<main>
