{include file="user/head" /}
<section class="wrap system-page">
  <form class="system-box verify-form module-fallback" method="post" action="{:url('pingfangdevice/login')}" data-login-form data-success-redirect="{$maccms.path}">
    <span class="eyebrow">会员</span>
    <h1>登录</h1>
    <p>请输入账号信息登录会员中心。</p>
    <label>
      <span>账号</span>
      <input type="text" name="user_name" autocomplete="username" placeholder="用户名或邮箱">
    </label>
    <label>
      <span>密码</span>
      <input type="password" name="user_pwd" autocomplete="current-password" placeholder="登录密码">
    </label>
    {if condition="$GLOBALS['config']['user']['login_verify'] eq 1"}
    <label>
      <span>验证码</span>
      <input type="text" name="verify" autocomplete="off" placeholder="输入验证码">
      <img class="mac_verify_img" src="{:url('verify/index')}" alt="点击刷新验证码">
    </label>
    {else/}
    <input type="hidden" name="verify" value="">
    {/if}
    <input type="hidden" name="openid" value="">
    <input type="hidden" name="col" value="">
    <button class="primary-btn" type="submit">登录</button>
  </form>
</section>
{include file="user/foot" /}
