{include file="public/head" seo_title="下载验证" seo_keywords="$maccms.site_keywords" seo_description="$maccms.site_description" /}
<section class="wrap system-page">
  <form class="system-box verify-form" onsubmit="return false;">
    <span class="eyebrow">下载验证</span>
    <h1>{$obj.vod_name|mac_default='下载验证'}</h1>
    <p>请输入下载密码后继续获取资源。</p>
    <label>
      <span>下载密码</span>
      <input type="password" name="pwd" autocomplete="current-password" placeholder="输入下载密码">
    </label>
    <button class="primary-btn" type="button" onclick="MAC.Pwd.Check(this)" data-mid="1" data-id="{$obj.vod_id}" data-type="5">提交验证</button>
  </form>
</section>
{include file="public/foot" /}
