{include file="user/head" /}
<section class="wrap system-page">
  <form class="system-box verify-form module-fallback" method="post" action="{:mac_url('user/reg')}">
    <span class="eyebrow">会员</span>
    <h1>注册</h1>
    <p>创建账号后可使用收藏、记录和互动功能。</p>
    <label>
      <span>账号</span>
      <input type="text" name="user_name" autocomplete="username" placeholder="设置用户名">
    </label>
    <label>
      <span>密码</span>
      <input type="password" name="user_pwd" autocomplete="new-password" placeholder="设置密码">
    </label>
    <button class="primary-btn" type="submit">注册</button>
  </form>
</section>
{include file="user/foot" /}
